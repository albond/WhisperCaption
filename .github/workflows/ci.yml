name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Provision Local.xcconfig (ad-hoc signing for CI)
        working-directory: WhisperCaption
        run: |
          # The Xcode project references WhisperCaption/Local.xcconfig as a
          # base configuration. That file is per-machine and gitignored;
          # contributors create theirs from the committed template. CI does
          # the same — copies the template, which has DEVELOPMENT_TEAM empty,
          # so the build below signs ad-hoc.
          cp Local.xcconfig.template Local.xcconfig
          cat Local.xcconfig

      - name: Resolve SwiftPM dependencies
        working-directory: WhisperCaption
        run: |
          xcodebuild \
            -project WhisperCaption.xcodeproj \
            -scheme WhisperCaption \
            -destination 'platform=macOS' \
            -resolvePackageDependencies

      - name: Build (ad-hoc signed)
        working-directory: WhisperCaption
        run: |
          set -o pipefail
          xcodebuild \
            -project WhisperCaption.xcodeproj \
            -scheme WhisperCaption \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath ../build/ci \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | xcpretty || true
          # Re-run without xcpretty for accurate exit code
          xcodebuild \
            -project WhisperCaption.xcodeproj \
            -scheme WhisperCaption \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath ../build/ci \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            build

      - name: Unit tests
        working-directory: WhisperCaption
        # Unit tests only — UI tests (`WhisperCaptionUITests`) launch the
        # real .app and need TCC permissions for Microphone / Screen
        # Recording that a fresh CI runner cannot grant, so they hang.
        # Run those locally before tagging a release.
        run: |
          xcodebuild \
            -project WhisperCaption.xcodeproj \
            -scheme WhisperCaption \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath ../build/ci \
            -only-testing:WhisperCaptionTests \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            test
