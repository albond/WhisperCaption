<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" font-family="-apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="WhisperCaption CC HUD example: cinema-style subtitle strip showing an English line above its Spanish translation in warm gold">
  <title>WhisperCaption — CC HUD example (English caption with Spanish translation)</title>

  <defs>
    <!-- Soft desktop blur behind the strip -->
    <linearGradient id="bgWall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1A1F32"/>
      <stop offset="0.55" stop-color="#2A2342"/>
      <stop offset="1" stop-color="#15131F"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.2" cy="0.85" r="0.7">
      <stop offset="0" stop-color="#5663F0" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#5663F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="0.85" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#F5B056" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F5B056" stop-opacity="0"/>
    </radialGradient>

    <!-- CC HUD strip body -->
    <linearGradient id="ccStrip" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1B1C26" stop-opacity="0.97"/>
      <stop offset="1" stop-color="#0E0F18" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="ccTopHL" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="stripShadow" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="26" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect width="1280" height="360" fill="url(#bgWall)"/>
  <rect width="1280" height="360" fill="url(#bgGlow)"/>
  <rect width="1280" height="360" fill="url(#bgGlow2)"/>

  <!-- ===== CC HUD strip ===== -->
  <g transform="translate(80,80)" filter="url(#stripShadow)">
    <rect width="1120" height="200" rx="28" ry="28" fill="url(#ccStrip)" stroke="#000" stroke-width="1"/>
    <rect width="1120" height="60" rx="28" ry="28" fill="url(#ccTopHL)"/>

    <!-- ===== Captioned text (no chrome, just subtitles) ===== -->
    <!-- English (source) -->
    <text x="560" y="68" text-anchor="middle" font-size="22" font-weight="600" fill="#FFFFFF">Star this repo — it costs nothing and takes one click,</text>
    <text x="560" y="100" text-anchor="middle" font-size="22" font-weight="600" fill="#FFFFFF">or send a tip from the Tip Jar below.</text>

    <!-- Spanish (translation) -->
    <text x="560" y="142" text-anchor="middle" font-size="18" font-style="italic" fill="#F5D866">Pon una estrella al repositorio — sin coste, un solo clic,</text>
    <text x="560" y="166" text-anchor="middle" font-size="18" font-style="italic" fill="#F5D866">o envía una propina desde el Tip Jar más abajo.</text>
  </g>

  <!-- Caption underline -->
  <text x="640" y="334" text-anchor="middle" font-size="13" fill="#B6BACC">CC HUD · cinema-style subtitle strip · floats above everything · invisible to screen capture when you want it to be</text>
</svg>
